name: "Test"
on:
  pull_request:
  push:
jobs:
  pre-job:
    continue-on-error: true
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          concurrent_skipping: "same_content_newer"
  pre-commit:
    runs-on: ubuntu-latest
    needs: pre-job
    if: needs.pre-job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v16
        with:
          name: wires
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build
        run: nix develop --print-build-logs -v --command pre-commit run --all-files
  nextest:
    runs-on: ubuntu-latest
    needs: pre-job
    if: needs.pre-job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - uses: cachix/cachix-action@v16
        with:
          name: wires
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Nextest
        run: nix develop --print-build-logs -v --command cargo nextest run
  find-vm-tests:
    runs-on: ubuntu-latest
    needs: pre-job
    if: needs.pre-job.outputs.should_skip != 'true'
    outputs:
      tests: ${{ steps.tests.outputs.tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v16
        with:
          name: wires
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: find tests
        id: tests
        run: |
          echo "tests=$(
            nix eval --impure --json --expr \
            'with builtins; filter ((import <nixpkgs>{}).lib.hasPrefix "nixos-vm-test") (attrNames (getFlake "${{ github.workspace }}").checks.x86_64-linux)'
          )" >> "$GITHUB_OUTPUT"
  vm-tests:
    runs-on: ubuntu-latest
    needs: find-vm-tests
    strategy:
      matrix:
        test: ${{ fromJSON(needs.find-vm-tests.outputs.tests) }}
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          enable_kvm: true
          extra_nix_config: "system-features = nixos-test benchmark big-parallel kvm"
      - uses: cachix/cachix-action@v16
        with:
          name: wires
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: |
          mkdir -p ./.store/nix/store
          chmod -R 0777 ./.store
      - name: Build
        run: nix build .#checks.x86_64-linux.${{ matrix.test }} --print-build-logs --impure --store ./.store
